name: Daily Investment Digest

on:
  schedule:
    - cron: '0 7 * * *'   # 7am UTC = 8am BST / 7am GMT
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  run-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit data files back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write YouTube cookies
        run: echo "${{ secrets.YOUTUBE_COOKIES }}" > /tmp/yt_cookies.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_API_KEY:      ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_COOKIES_FILE: /tmp/yt_cookies.txt
        run: python pipeline/monitor.py

      - name: Copy data for GitHub Pages
        run: |
          mkdir -p docs/data
          cp data/latest.json docs/data/latest.json
          cp data/processed_videos.json docs/data/ 2>/dev/null || true

      - name: Commit updated data
        run: |
          git config user.name  "Investment Digest Bot"
          git config user.email "digest-bot@users.noreply.github.com"
          git add data/ docs/data/
          git diff --cached --quiet || git commit -m "digest: $(date +'%Y-%m-%d')"
          git push
